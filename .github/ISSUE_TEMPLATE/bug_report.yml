name: Bug report
description: Report a problem with mcp-google-search-console
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the fields below so the issue can be reproduced.
  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `pip show mcp-google-search-console | grep Version` or `uvx mcp-google-search-console --version` (if available).
      placeholder: "2.0.2"
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      description: Claude Desktop, Claude Code, Cursor, Zed, Continue, Windsurf, custom, etc.
      placeholder: "Claude Desktop 0.7.x on macOS"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.1"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you ask the server to do, and what went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Configure client with ...
        2. Ask "..."
        3. Error is ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant logs. **Redact any OAuth tokens, client secrets, or other credentials before pasting.**
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have redacted credentials from the logs above.
          required: true
        - label: I have searched existing issues and this has not been reported.
          required: true
